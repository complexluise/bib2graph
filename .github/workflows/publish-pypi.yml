name: publish-pypi

# Publica el paquete a PyPI productivo vía Trusted Publishing (OIDC) — SIN tokens ni secrets.
# Workflow REUSABLE: lo invoca release-please.yml (job `publish`) cuando corta un Release
# (gateado por su output `release_created`). También MANUAL (Actions → "publish-pypi" →
# "Run workflow") como fallback / primera publicación.
#
# Requiere (una sola vez) un "pending publisher" en https://pypi.org:
#   Your account → Publishing → Add a pending publisher:
#     - PyPI Project Name: bib2graph
#     - Owner:             complexluise
#     - Repository name:   bib2graph
#     - Workflow name:     publish-pypi.yml
#     - Environment name:  pypi
#
# El paquete es Python puro (no hay frontend que buildear). `uv build` arma sdist + wheel.
# La única diferencia con TestPyPI es el índice destino (productivo, default de la action)
# y el environment (`pypi`).

on:
  # Reusable: lo invoca release-please.yml (job `publish`) cuando corta un Release.
  # workflow_call en vez de `on: release` porque el Release que crea release-please
  # con el GITHUB_TOKEN NO dispara workflows (regla anti-recursión).
  workflow_call:
  # Fallback manual: Actions → publish-pypi → Run workflow (elegir rama, p. ej. main).
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # requerido para el OIDC del trusted publishing

jobs:
  publish-pypi:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Build (paquete Python puro; sin frontend)
        run: uv build
      - name: Publish to PyPI (trusted publishing)
        # Sin repository-url → la action publica a PyPI productivo (https://upload.pypi.org/legacy/).
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # attestations OFF: cuando este workflow se invoca como REUSABLE desde
          # release-please.yml, el certificado de la attestation (PEP 740) registra el
          # workflow top-level (release-please.yml), no este archivo. El Trusted Publisher
          # de PyPI espera publish-pypi.yml → PyPI rechaza el upload con 400 ("Build Config
          # URI does not match expected Trusted Publisher"). PyPA no soporta reusable
          # workflows con Trusted Publishing. El OIDC del token sí matchea (job_workflow_ref
          # = publish-pypi.yml), así que deshabilitar la attestation desbloquea el publish
          # sin perder el trusted publishing. El disparo MANUAL (workflow_dispatch) no sufre
          # esto (corre directo, no reusable), pero mantenemos el flag por consistencia.
          attestations: false
