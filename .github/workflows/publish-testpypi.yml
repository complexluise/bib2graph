name: publish-testpypi

# Publica el paquete a TestPyPI vía Trusted Publishing (OIDC) — SIN tokens ni secrets.
# Disparo MANUAL: Actions → "publish-testpypi" → "Run workflow".
#
# Requiere (una sola vez) un "pending publisher" en https://test.pypi.org:
#   Your account → Publishing → Add a pending publisher:
#     - PyPI Project Name: bib2graph
#     - Owner:             complexluise
#     - Repository name:   bib2graph
#     - Workflow name:     publish-testpypi.yml
#     - Environment name:  testpypi
#
# El paso a PyPI productivo (disparado al crear el GitHub Release de release-please)
# se agrega en una segunda tanda, una vez validado el flujo en TestPyPI. Ver VERSIONING.md.

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # requerido para el OIDC del trusted publishing

jobs:
  publish-testpypi:
    runs-on: ubuntu-latest
    environment: testpypi
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Enable corepack (pnpm pinneado en package.json)
        run: corepack enable
      - name: Build frontend (llena src/bib2graph/gui/static/ antes del wheel)
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - name: Build wheel (directo del working tree, con el frontend ya buildeado)
        # NO `uv build` a secas: eso arma sdist y el wheel DESDE el sdist, que
        # excluye el frontend gitignored (gui/static) → force-include falla.
        # `--wheel` construye el wheel directo del árbol (con el pnpm build de arriba).
        run: uv build --wheel
      - name: Publish to TestPyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
